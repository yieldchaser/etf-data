name: Daily ETF Scrape

on:
  schedule:
    # 30 1 = 01:30 UTC (Approx 8:30 PM ET - Post-Market Safety)
    # 30 12 = 12:30 UTC (Approx 7:30 AM ET - Pre-Market Safety)
    # * * * = Runs EVERY DAY (Mon, Tue, Wed, Thu, Fri, Sat, Sun)
    - cron: '30 1,12 * * *'
  workflow_dispatch:      # Manual Run Button

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install libraries
        run: |
          pip install pandas requests lxml openpyxl beautifulsoup4 html5lib selenium curl_cffi

      - name: Run Scraper
        run: python scraper.py

      - name: Save Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*
          # Only commit + push if there are actual changes
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Auto-update: Daily Holdings Data 📈"
            # Pull --rebase to incorporate any commits pushed to main while the scraper ran
            git pull --rebase origin main
            git push origin main
          fi

