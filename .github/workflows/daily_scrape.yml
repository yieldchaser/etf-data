name: Daily ETF Scrape

on:
  schedule:
    # 14:00 UTC = 10:00 AM ET  — primary run, after all issuers publish T+1 data
    #   Invesco API publishes overnight; Pacer CSV, First Trust, Alpha Architect
    #   are all updated before US market open (9:30 AM ET). 10 AM ET is the
    #   earliest safe window where every source is guaranteed to be fresh.
    # 22:00 UTC = 06:00 PM ET  — catch-all run for any late publishers or retries
    # Weekdays only (Mon–Fri). No point running on weekends (no new trading data).
    - cron: '0 14,22 * * 1-5'
  workflow_dispatch:      # Manual Run Button

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write    # needed to dispatch build_site workflow

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install libraries
        run: |
          pip install pandas requests lxml openpyxl beautifulsoup4 html5lib selenium curl_cffi

      - name: Run Scraper
        run: python scraper.py

      - name: Save Data
        id: save_data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*
          # Only commit + push if there are actual changes
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            echo "data_changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto-update: Daily Holdings Data 📈"
            # Pull --rebase to incorporate any commits pushed to main while the scraper ran
            git pull --rebase origin main
            git push origin main
            echo "data_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger site rebuild
        # Explicitly dispatch the Build Site workflow after new data is pushed.
        # Belt-and-suspenders alongside the workflow_run trigger in build_site.yml.
        if: steps.save_data.outputs.data_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build_site.yml',
              ref: 'main',
            });
            console.log('Build site workflow dispatched.');

