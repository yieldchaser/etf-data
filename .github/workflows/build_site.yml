name: Build site

# Runs after the daily scraper commits new data.
# Uses workflow_run to chain directly off "Daily ETF Scrape" — this bypasses
# the GitHub limitation where bot-authored pushes don't trigger other workflows.
# Also triggers on human code pushes and manual dispatch.

on:
  workflow_run:
    workflows: ["Daily ETF Scrape"]
    types: [completed]
    branches: [main]

  push:
    branches: [main]
    paths:
      - 'predator/**'
      - 'markets/**'
      - 'docs/**'
      - 'config.yaml'
      - '.github/workflows/build_site.yml'
      - 'requirements.txt'

  workflow_dispatch:

# Cancel any in-progress build when a newer one arrives — always deploy freshest data.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Only proceed if scraper succeeded (or triggered by push/dispatch).
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # When triggered by workflow_run, check out the exact commit the scraper
          # pushed — not just HEAD — so we always build with the freshest data.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml pyarrow pytest yfinance curl_cffi

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build site artifacts (predator)
        run: python -m predator.build --source data/all_history.csv --output docs/data --config config.yaml

      - name: Fetch market data (yfinance)
        run: |
          mkdir -p data/markets
          python -m markets.fetch_yf --out data/markets
        continue-on-error: true

      - name: Fetch FRED data
        run: python -m markets.fetch_fred --out data/markets
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Build markets.json + sim_underlyings.json
        run: python -m markets.build --source data/markets --output docs/data
        continue-on-error: true

      - name: Verify outputs
        run: |
          test -f docs/data/leaderboard.json
          test -f docs/data/holdings_latest.json
          test -f docs/data/changelog.json
          test -f docs/data/metadata.json
          test -f docs/data/leaderboard.parquet
          ls -lh docs/data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

